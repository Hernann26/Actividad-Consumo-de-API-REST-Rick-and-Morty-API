<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<link rel="stylesheet" href="assets/css/style.css">
 <script src="assets/js/script.js" defer></script>
</head>
<body>

  <header>
    <h1>Rick & Morty API <span>Rest Activity</span></h1>
  </header>

  <main>
    <section class="controls">
      <button id="btn-load">1. Obtener 10 Personajes</button>
      <button id="btn-group" disabled>2. Agrupar por Especie</button>
      <button id="btn-card" disabled>3. Ver Ficha Individual</button>
    </section>

    <div id="data-status" class="status-msg">Presiona el primer botón para cargar los datos...</div>

    <section class="results-container">
      
      <div id="list-section" class="output-box hidden">
        <h2>Lista de Personajes (Primeros 10)</h2>
        <ul id="characters-list"></ul>
      </div>

      <div id="group-section" class="output-box hidden">
        <h2>Agrupación por Especie</h2>
        <div id="species-group"></div>
      </div>

      <div id="card-section" class="output-box hidden">
        <h2>Ficha de Personaje</h2>
        <div id="character-card" class="card"></div>
      </div>

    </section>
  </main>


</body>
</html>
